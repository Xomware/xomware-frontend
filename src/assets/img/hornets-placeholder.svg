  <!-- Left handle -->
  <path d="M30 28 Q18 28 18 38 Q18 48 30 48" fill="none" stroke="#00788C" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Right handle -->
  <path d="M66 28 Q78 28 78 38 Q78 48 66 48" fill="none" stroke="#00788C" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Stem -->
  <rect x="44.5" y="54" width="7" height="12" rx="3" fill="url(#hornets-teal)" opacity="0.9"/>

  <!-- Base -->
  <rect x="35" y="64" width="26" height="6" rx="3" fill="url(#hornets-teal)" opacity="0.85"/>

  <!-- Star on cup -->
  <polygon points="48,32 50,38 56,38 51,42 53,48 48,44 43,48 45,42 40,38 46,38" fill="#00788C" opacity="0.25"/>

  <!-- Subtle teal glow ring -->
