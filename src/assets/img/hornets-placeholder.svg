<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="hornets-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2e33"/>
      <stop offset="100%" stop-color="#061a1d"/>
    </linearGradient>
    <linearGradient id="hornets-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00788C"/>
      <stop offset="100%" stop-color="#005f6e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="96" height="96" rx="20" fill="url(#hornets-bg)"/>

  <!-- Trophy silhouette -->
  <!-- Cup body -->
