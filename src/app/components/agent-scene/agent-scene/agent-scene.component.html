<section class="agent-scene-section">
  <div class="scene-header">
    <span class="scene-eyebrow">🤖 The Team</span>
    <h2 class="scene-title">Meet the Agents</h2>
    <p class="scene-subtitle">They never sleep. Hover to meet them.</p>
  </div>

  <!-- Agent scene stage — blobs positioned inside -->
  <div class="scene-stage" #sceneStage>
    <!-- Ground line decorative -->
    <div class="scene-ground"></div>

    <!-- Agent blobs (absolute positioned) -->
    <app-agent-blob
      *ngFor="let agent of visibleAgents"
      [agent]="agent"
      [style.left.px]="agent.startX"
      [style.top.px]="agent.startY"
      (blobClick)="onAgentClick($event)"
      (blobHover)="onBlobHover($event)"
    ></app-agent-blob>
  </div>

  <!-- Agent name pills -->
  <div class="agent-pills">
    <button
      *ngFor="let agent of agents"
      class="agent-pill"
      [style.--agent-color]="agent.color"
      (click)="onAgentClick(agent)"
    >
      <span class="pill-dot" [style.background]="agent.color"></span>
      {{ agent.displayName }}
    </button>
  </div>

  <!-- Status modal -->
  <app-agent-status-modal
    [agent]="selectedAgent"
    (close)="onModalClose()"
  ></app-agent-status-modal>
</section>
