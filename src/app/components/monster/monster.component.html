<div class="monster-wrapper" [ngClass]="state">
  <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg" class="monster-svg">
    <defs>
      <radialGradient id="bodyGrad" cx="45%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#2a3a4a" />
        <stop offset="70%" stop-color="#1a2535" />
        <stop offset="100%" stop-color="#0f1a25" />
      </radialGradient>
      <radialGradient id="bellyGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#2e4055" stop-opacity="0.6" />
        <stop offset="100%" stop-color="#1a2535" stop-opacity="0" />
      </radialGradient>
      <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.2" />
        <stop offset="100%" stop-color="#00b4d8" stop-opacity="0" />
      </radialGradient>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="shadow">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
      </filter>
    </defs>

    <!-- Ground glow -->
    <ellipse cx="150" cy="280" rx="90" ry="18" fill="url(#glowGrad)" class="ground-glow" />

    <!-- Shadow on ground -->
    <ellipse cx="150" cy="275" rx="50" ry="8" fill="rgba(0,0,0,0.25)" class="ground-shadow" />

    <g class="character" filter="url(#shadow)">
      <!-- Left leg -->
      <g class="left-leg">
        <path d="M118 248 Q116 268 112 278 Q110 284 116 286 Q122 286 120 278 Q122 268 124 250"
              fill="url(#bodyGrad)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
        <!-- Foot -->
        <ellipse cx="116" cy="285" rx="10" ry="4" fill="#0f1a25" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.2" />
      </g>

      <!-- Right leg -->
      <g class="right-leg">
        <path d="M176 248 Q178 268 182 278 Q184 284 178 286 Q172 286 174 278 Q172 268 170 250"
              fill="url(#bodyGrad)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
        <ellipse cx="178" cy="285" rx="10" ry="4" fill="#0f1a25" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.2" />
      </g>

      <!-- Left arm -->
      <g class="left-arm">
        <path d="M88 185 Q68 192 58 210 Q55 218 62 220 Q68 220 66 212 Q72 198 88 192"
              fill="url(#bodyGrad)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
        <!-- Hand -->
        <circle cx="60" cy="216" r="6" fill="#0f1a25" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.2" />
      </g>

      <!-- Right arm -->
      <g class="right-arm">
        <path d="M212 185 Q232 192 242 210 Q245 218 238 220 Q232 220 234 212 Q228 198 212 192"
              fill="url(#bodyGrad)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
        <circle cx="240" cy="216" r="6" fill="#0f1a25" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.2" />
      </g>

      <!-- Main body -->
      <ellipse cx="150" cy="195" rx="72" ry="78" fill="url(#bodyGrad)" stroke="#00b4d8" stroke-width="1.2" stroke-opacity="0.3" />

      <!-- Belly highlight -->
      <ellipse cx="150" cy="210" rx="40" ry="35" fill="url(#bellyGrad)" />

      <!-- Body shine -->
      <ellipse cx="130" cy="160" rx="25" ry="18" fill="white" opacity="0.04" transform="rotate(-15 130 160)" />

      <!-- Eyes -->
      <g class="eyes">
        <!-- Left eye -->
        <g class="left-eye">
          <ellipse cx="125" cy="175" rx="22" ry="24" fill="#eef2f7" />
          <ellipse cx="125" cy="175" rx="21" ry="23" fill="white" />
          <g class="left-pupil-group">
            <circle cx="128" cy="178" r="10" fill="#0a1018" />
            <circle cx="128" cy="178" r="6" fill="#152030" />
            <circle cx="131" cy="174" r="3.5" fill="white" opacity="0.9" />
            <circle cx="125" cy="181" r="1.5" fill="white" opacity="0.4" />
          </g>
        </g>
        <!-- Right eye -->
        <g class="right-eye">
          <ellipse cx="175" cy="175" rx="22" ry="24" fill="#eef2f7" />
          <ellipse cx="175" cy="175" rx="21" ry="23" fill="white" />
          <g class="right-pupil-group">
            <circle cx="178" cy="178" r="10" fill="#0a1018" />
            <circle cx="178" cy="178" r="6" fill="#152030" />
            <circle cx="181" cy="174" r="3.5" fill="white" opacity="0.9" />
            <circle cx="175" cy="181" r="1.5" fill="white" opacity="0.4" />
          </g>
        </g>
      </g>

      <!-- Eyelids -->
      <g class="eyelids">
        <ellipse cx="125" cy="175" rx="23" ry="25" fill="url(#bodyGrad)" class="left-eyelid" />
        <ellipse cx="175" cy="175" rx="23" ry="25" fill="url(#bodyGrad)" class="right-eyelid" />
      </g>

      <!-- Mouth -->
      <g class="mouth">
        <path d="M138 215 Q150 224 162 215" stroke="#3a5068" stroke-width="2.5" fill="none" stroke-linecap="round" class="mouth-line" />
      </g>

      <!-- Cheek blush -->
      <ellipse cx="102" cy="198" rx="10" ry="6" fill="#00b4d8" opacity="0.08" class="left-cheek" />
      <ellipse cx="198" cy="198" rx="10" ry="6" fill="#00b4d8" opacity="0.08" class="right-cheek" />

      <!-- Little antenna/horn -->
      <g class="antenna">
        <path d="M150 118 Q148 98 155 85" stroke="#00b4d8" stroke-width="2" fill="none" stroke-linecap="round" stroke-opacity="0.5" />
        <circle cx="155" cy="83" r="5" fill="#00b4d8" opacity="0.6" filter="url(#softGlow)" class="antenna-tip" />
      </g>
    </g>

    <!-- Headphones accessory (xomify) -->
    <g class="headphones-accessory">
      <path d="M90 162 Q90 110 150 105 Q210 110 210 162" stroke="#9c0abf" stroke-width="6" fill="none" stroke-linecap="round" />
      <rect x="74" y="155" width="24" height="35" rx="10" fill="#9c0abf" />
      <rect x="202" y="155" width="24" height="35" rx="10" fill="#9c0abf" />
      <rect x="78" y="159" width="16" height="27" rx="7" fill="#7a0896" />
      <rect x="206" y="159" width="16" height="27" rx="7" fill="#7a0896" />
      <!-- Music notes floating -->
      <text x="60" y="140" fill="#9c0abf" font-size="16" opacity="0.7" class="note1">&#9835;</text>
      <text x="230" y="130" fill="#9c0abf" font-size="12" opacity="0.5" class="note2">&#9834;</text>
    </g>

    <!-- DJ turntable accessory (xomcloud) -->
    <g class="dj-accessory">
      <rect x="60" y="252" width="180" height="55" rx="8" fill="#2a1a0a" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.4" />
      <rect x="65" y="255" width="170" height="48" rx="6" fill="#1a1008" />
      <!-- Left platter -->
      <circle cx="110" cy="275" r="20" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.3" />
      <circle cx="110" cy="275" r="13" fill="none" stroke="#282828" stroke-width="0.5" />
      <circle cx="110" cy="275" r="7" fill="none" stroke="#282828" stroke-width="0.5" />
      <circle cx="110" cy="275" r="3" fill="#ff6b35" class="platter-left" />
      <!-- Right platter -->
      <circle cx="190" cy="275" r="20" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.3" />
      <circle cx="190" cy="275" r="13" fill="none" stroke="#282828" stroke-width="0.5" />
      <circle cx="190" cy="275" r="7" fill="none" stroke="#282828" stroke-width="0.5" />
      <circle cx="190" cy="275" r="3" fill="#ff6b35" class="platter-right" />
      <!-- Mixer -->
      <rect x="138" y="268" width="24" height="14" rx="3" fill="#333" />
      <rect x="146" y="266" width="8" height="6" rx="2" fill="#ff6b35" class="crossfader" />
      <!-- Headphones on ear (DJ style, one ear) -->
      <path d="M85 165 Q85 145 100 148" stroke="#ff6b35" stroke-width="4" fill="none" stroke-linecap="round" />
      <rect x="74" y="160" width="18" height="25" rx="7" fill="#ff6b35" />
      <rect x="77" y="163" width="12" height="19" rx="5" fill="#cc5520" />
    </g>

    <!-- Football helmet accessory (xomper) -->
    <g class="football-accessory">
      <path d="M90 163 Q88 108 150 100 Q212 108 210 163 Q210 172 200 172 L100 172 Q90 172 90 163Z"
            fill="#0d3320" stroke="#00ffab" stroke-width="2" />
      <path d="M150 100 L150 135" stroke="#00ffab" stroke-width="2.5" stroke-opacity="0.5" />
      <path d="M115 168 Q120 182 135 185 Q150 188 165 185 Q180 182 185 168"
            stroke="#00ffab" stroke-width="3" fill="none" stroke-linecap="round" />
      <line x1="135" y1="168" x2="140" y2="183" stroke="#00ffab" stroke-width="2" stroke-linecap="round" />
      <line x1="165" y1="168" x2="160" y2="183" stroke="#00ffab" stroke-width="2" stroke-linecap="round" />
      <!-- Football in hand -->
      <ellipse cx="55" cy="208" rx="14" ry="9" fill="#5c3a1a" stroke="#00ffab" stroke-width="1" transform="rotate(-25 55 208)" class="football" />
      <line x1="50" y1="204" x2="60" y2="212" stroke="#fff" stroke-width="0.8" opacity="0.5" />
    </g>

    <!-- Sleep Z's -->
    <g class="sleep-zs">
      <text x="210" y="140" fill="#00b4d8" font-size="20" font-weight="bold" class="z1">Z</text>
      <text x="228" y="118" fill="#00b4d8" font-size="15" font-weight="bold" class="z2">z</text>
      <text x="240" y="100" fill="#00b4d8" font-size="11" font-weight="bold" class="z3">z</text>
    </g>

    <!-- Wave hand (replaces right arm on wave) -->
    <g class="wave-hand">
      <path d="M215 180 Q238 172 245 155 Q248 145 242 143 Q236 143 235 152 Q232 166 215 175"
            fill="url(#bodyGrad)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.3" />
      <circle cx="243" cy="148" r="6" fill="#0f1a25" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.2" />
    </g>
  </svg>
</div>
