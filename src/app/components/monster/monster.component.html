<div class="robot-wrapper" [ngClass]="state">
  <svg viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg" class="robot-svg">
    <defs>
      <linearGradient id="bodyMetal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#2a3545" />
        <stop offset="50%" stop-color="#1e2a38" />
        <stop offset="100%" stop-color="#15202d" />
      </linearGradient>
      <linearGradient id="headMetal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#303d50" />
        <stop offset="50%" stop-color="#243040" />
        <stop offset="100%" stop-color="#1a2535" />
      </linearGradient>
      <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0a1520" />
        <stop offset="100%" stop-color="#060d15" />
      </linearGradient>
      <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.2" />
        <stop offset="100%" stop-color="#00b4d8" stop-opacity="0" />
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="shadowDrop">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
      </filter>
    </defs>

    <!-- Ground glow -->
    <ellipse cx="150" cy="305" rx="80" ry="15" fill="url(#glowGrad)" class="ground-glow" />
    <!-- Ground shadow -->
    <ellipse cx="150" cy="302" rx="45" ry="7" fill="rgba(0,0,0,0.2)" class="ground-shadow" />

    <g class="character" filter="url(#shadowDrop)">

      <!-- Left leg -->
      <g class="left-leg">
        <rect x="115" y="268" width="14" height="24" rx="4" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <!-- Foot -->
        <rect x="109" y="289" width="24" height="10" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <!-- Knee joint -->
        <circle cx="122" cy="270" r="4" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
      </g>

      <!-- Right leg -->
      <g class="right-leg">
        <rect x="171" y="268" width="14" height="24" rx="4" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <rect x="167" y="289" width="24" height="10" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <circle cx="178" cy="270" r="4" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
      </g>

      <!-- Left arm -->
      <g class="left-arm">
        <!-- Shoulder joint -->
        <circle cx="90" cy="195" r="7" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
        <!-- Upper arm -->
        <rect x="76" y="195" width="12" height="30" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <!-- Elbow -->
        <circle cx="82" cy="226" r="4" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
        <!-- Forearm -->
        <rect x="76" y="226" width="12" height="25" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <!-- Hand -->
        <circle cx="82" cy="255" r="8" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
      </g>

      <!-- Right arm -->
      <g class="right-arm">
        <circle cx="210" cy="195" r="7" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
        <rect x="212" y="195" width="12" height="30" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <circle cx="218" cy="226" r="4" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
        <rect x="212" y="226" width="12" height="25" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
        <circle cx="218" cy="255" r="8" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
      </g>

      <!-- Body -->
      <rect x="98" y="185" width="104" height="88" rx="16" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.25" />
      <!-- Chest panel -->
      <rect x="118" y="200" width="64" height="40" rx="8" fill="url(#screenGrad)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
      <!-- Chest light -->
      <circle cx="150" cy="220" r="6" fill="#00b4d8" opacity="0.5" filter="url(#glow)" class="chest-light" />
      <!-- Chest panel lines -->
      <line x1="130" y1="230" x2="170" y2="230" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.15" />
      <line x1="135" y1="236" x2="165" y2="236" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.1" />
      <!-- Belt/waist -->
      <rect x="105" y="260" width="90" height="12" rx="4" fill="#15202d" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.15" />
      <circle cx="150" cy="266" r="3" fill="#00b4d8" opacity="0.3" />

      <!-- Neck -->
      <rect x="140" y="172" width="20" height="16" rx="4" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.2" />

      <!-- Head -->
      <g class="head">
        <rect x="105" y="110" width="90" height="66" rx="18" fill="url(#headMetal)" stroke="#00b4d8" stroke-width="1.2" stroke-opacity="0.3" />
        <!-- Screen face -->
        <rect x="115" y="118" width="70" height="50" rx="12" fill="url(#screenGrad)" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.15" />

        <!-- Eyes -->
        <g class="eyes">
          <g class="left-eye">
            <circle cx="137" cy="140" r="10" fill="#00b4d8" opacity="0.9" filter="url(#glow)" class="eye-glow" />
            <circle cx="137" cy="140" r="6" fill="#fff" opacity="0.95" />
            <circle cx="137" cy="140" r="3" fill="#00b4d8" class="eye-pupil" />
          </g>
          <g class="right-eye">
            <circle cx="163" cy="140" r="10" fill="#00b4d8" opacity="0.9" filter="url(#glow)" class="eye-glow" />
            <circle cx="163" cy="140" r="6" fill="#fff" opacity="0.95" />
            <circle cx="163" cy="140" r="3" fill="#00b4d8" class="eye-pupil" />
          </g>
        </g>

        <!-- Mouth (LED bar) -->
        <g class="mouth">
          <rect x="133" y="155" width="34" height="6" rx="3" fill="#00b4d8" opacity="0.4" class="mouth-bar" />
        </g>

        <!-- Eyelids (for blink/sleep) -->
        <g class="eyelids">
          <rect x="125" y="128" width="25" height="24" rx="4" fill="url(#screenGrad)" class="left-eyelid" />
          <rect x="151" y="128" width="25" height="24" rx="4" fill="url(#screenGrad)" class="right-eyelid" />
        </g>

        <!-- Ear panels -->
        <rect x="95" y="130" width="14" height="24" rx="5" fill="url(#headMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" class="left-ear" />
        <rect x="191" y="130" width="14" height="24" rx="5" fill="url(#headMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" class="right-ear" />
      </g>

      <!-- Antenna -->
      <g class="antenna">
        <rect x="147" y="95" width="6" height="18" rx="3" fill="url(#headMetal)" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.3" />
        <circle cx="150" cy="92" r="6" fill="#00b4d8" opacity="0.6" filter="url(#glow)" class="antenna-tip" />
      </g>
    </g>

    <!-- ===== ACCESSORIES ===== -->

    <!-- Headphones (xomify) - sits clearly over the head -->
    <g class="headphones-acc">
      <!-- Headband -->
      <path d="M96 130 Q96 85 150 78 Q204 85 204 130" stroke="#9c0abf" stroke-width="7" fill="none" stroke-linecap="round" />
      <!-- Left cup - covers left ear panel -->
      <rect x="82" y="122" width="26" height="36" rx="10" fill="#9c0abf" />
      <rect x="86" y="126" width="18" height="28" rx="7" fill="#7a0896" />
      <circle cx="95" cy="140" r="4" fill="#5a0670" />
      <!-- Right cup - covers right ear panel -->
      <rect x="192" y="122" width="26" height="36" rx="10" fill="#9c0abf" />
      <rect x="196" y="126" width="18" height="28" rx="7" fill="#7a0896" />
      <circle cx="205" cy="140" r="4" fill="#5a0670" />
      <!-- Music notes -->
      <text x="70" y="110" fill="#9c0abf" font-size="18" opacity="0.7" class="note1">&#9835;</text>
      <text x="225" y="100" fill="#9c0abf" font-size="14" opacity="0.5" class="note2">&#9834;</text>
      <text x="60" y="85" fill="#9c0abf" font-size="11" opacity="0.4" class="note3">&#9833;</text>
    </g>

    <!-- DJ turntable (xomcloud) -->
    <g class="dj-acc">
      <!-- Table -->
      <rect x="55" y="270" width="190" height="50" rx="6" fill="#2a1a0a" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.4" />
      <rect x="60" y="273" width="180" height="44" rx="4" fill="#1a1008" />
      <!-- Left platter -->
      <circle cx="110" cy="292" r="18" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.3" />
      <circle cx="110" cy="292" r="12" fill="none" stroke="#282828" stroke-width="0.5" class="vinyl-groove-l" />
      <circle cx="110" cy="292" r="6" fill="none" stroke="#282828" stroke-width="0.5" />
      <circle cx="110" cy="292" r="3" fill="#ff6b35" class="platter-dot-l" />
      <!-- Right platter -->
      <circle cx="190" cy="292" r="18" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.3" />
      <circle cx="190" cy="292" r="12" fill="none" stroke="#282828" stroke-width="0.5" class="vinyl-groove-r" />
      <circle cx="190" cy="292" r="6" fill="none" stroke="#282828" stroke-width="0.5" />
      <circle cx="190" cy="292" r="3" fill="#ff6b35" class="platter-dot-r" />
      <!-- Mixer -->
      <rect x="140" y="284" width="20" height="16" rx="3" fill="#333" />
      <rect x="146" y="282" width="8" height="6" rx="2" fill="#ff6b35" class="crossfader" />
      <!-- Tone arm -->
      <line x1="125" y1="278" x2="115" y2="286" stroke="#666" stroke-width="1.5" stroke-linecap="round" />
      <line x1="205" y1="278" x2="195" y2="286" stroke="#666" stroke-width="1.5" stroke-linecap="round" />
      <!-- Single headphone on one ear (DJ style) -->
      <path d="M90 128 Q88 115 95 112 Q102 110 104 125" stroke="#ff6b35" stroke-width="4" fill="none" stroke-linecap="round" />
      <rect x="82" y="125" width="18" height="28" rx="7" fill="#ff6b35" />
      <rect x="85" y="128" width="12" height="22" rx="5" fill="#cc5520" />
    </g>

    <!-- Football helmet (xomper) - sits on top of head -->
    <g class="football-acc">
      <!-- Helmet shell - above the head (head top is y=110) -->
      <path d="M95 115 Q93 70 150 60 Q207 70 205 115 Q205 120 200 120 L100 120 Q95 120 95 115Z"
            fill="#0d3320" stroke="#00ffab" stroke-width="2.5" />
      <!-- Center stripe -->
      <line x1="150" y1="62" x2="150" y2="118" stroke="#00ffab" stroke-width="3" stroke-opacity="0.6" />
      <!-- Side stripes -->
      <line x1="122" y1="72" x2="118" y2="118" stroke="#00ffab" stroke-width="1.5" stroke-opacity="0.3" />
      <line x1="178" y1="72" x2="182" y2="118" stroke="#00ffab" stroke-width="1.5" stroke-opacity="0.3" />
      <!-- Facemask - hangs below helmet in front of face -->
      <path d="M108 120 Q112 140 130 145 Q150 148 170 145 Q188 140 192 120"
            stroke="#00ffab" stroke-width="3" fill="none" stroke-linecap="round" />
      <line x1="130" y1="122" x2="135" y2="143" stroke="#00ffab" stroke-width="2" stroke-linecap="round" />
      <line x1="170" y1="122" x2="165" y2="143" stroke="#00ffab" stroke-width="2" stroke-linecap="round" />
      <line x1="150" y1="120" x2="150" y2="146" stroke="#00ffab" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Sleep Z's -->
    <g class="sleep-zs">
      <text x="215" y="115" fill="#00b4d8" font-size="22" font-weight="bold" class="z1">Z</text>
      <text x="232" y="92" fill="#00b4d8" font-size="16" font-weight="bold" class="z2">z</text>
      <text x="245" y="75" fill="#00b4d8" font-size="11" font-weight="bold" class="z3">z</text>
    </g>

    <!-- Wave hand (replaces right arm) -->
    <g class="wave-hand">
      <circle cx="210" cy="195" r="7" fill="#1a2535" stroke="#00b4d8" stroke-width="0.6" stroke-opacity="0.3" />
      <rect x="212" y="175" width="12" height="30" rx="5" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.2" />
      <circle cx="218" cy="170" r="8" fill="url(#bodyMetal)" stroke="#00b4d8" stroke-width="0.8" stroke-opacity="0.25" />
    </g>
  </svg>
</div>
