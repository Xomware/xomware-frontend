<!-- Sticky Navigation -->
<nav class="sticky-nav" [class.scrolled]="isScrolled" aria-label="Site navigation">
  <div class="nav-inner">
    <a routerLink="/" class="nav-brand">
      <img src="assets/img/xomware-icon-transparent-background.png" alt="Xomware" class="nav-logo" />
      <span class="nav-wordmark">XOMWARE</span>
    </a>
    <div class="nav-links">
      <a routerLink="/" fragment="apps" class="nav-link">Apps</a>
      <a routerLink="/music" class="nav-link">Music</a>
      <a href="https://github.com/Xomware" target="_blank" rel="noopener" class="nav-link nav-link-github">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="nav-icon" aria-hidden="true">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" fill="currentColor"/>
        </svg>
        GitHub
      </a>

      <div class="report-menu-wrapper">
        <button
          type="button"
          class="nav-link report-menu-trigger"
          (click)="toggleReportMenu($event)"
          [attr.aria-expanded]="reportMenuOpen"
          aria-haspopup="menu"
          aria-label="Report an issue"
        >
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="nav-icon" aria-hidden="true">
            <path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" fill="currentColor"/>
          </svg>
          Report Issue
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="report-menu-caret" [class.open]="reportMenuOpen" aria-hidden="true">
            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" fill="currentColor"/>
          </svg>
        </button>
        <div class="report-menu" role="menu" *ngIf="reportMenuOpen">
          <span class="report-menu-header">Choose an app</span>
          <a
            *ngFor="let target of reportTargets"
            [href]="reportUrl(target.repo)"
            target="_blank"
            rel="noopener"
            role="menuitem"
            class="report-menu-item"
            (click)="closeReportMenu()"
          >
            <span class="report-menu-label">{{ target.label }}</span>
            <span class="report-menu-repo">{{ target.repo }}</span>
          </a>
        </div>
      </div>

      <!-- Sign in / user menu -->
      <ng-container *ngIf="!user">
        <a routerLink="/auth/sign-in" class="nav-link nav-link-signin">Sign in</a>
      </ng-container>
      <div class="user-menu-wrapper" *ngIf="user">
        <button
          type="button"
          class="nav-link user-menu-trigger"
          (click)="toggleUserMenu($event)"
          [attr.aria-expanded]="userMenuOpen"
          aria-haspopup="menu"
          [attr.aria-label]="'Account menu for ' + userLabel"
        >
          <span class="user-menu-avatar" [class.has-image]="profile?.avatarUrl">
            <img
              *ngIf="profile?.avatarUrl as src"
              [src]="src"
              alt=""
            />
            <span *ngIf="!profile?.avatarUrl" class="user-menu-avatar-initial" aria-hidden="true">
              {{ userInitial }}
            </span>
          </span>
          <span class="user-menu-handle">{{ userLabel }}</span>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="report-menu-caret" [class.open]="userMenuOpen" aria-hidden="true">
            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" fill="currentColor"/>
          </svg>
        </button>
        <div class="report-menu user-menu" role="menu" *ngIf="userMenuOpen">
          <a routerLink="/profile" role="menuitem" class="report-menu-item" (click)="closeUserMenu()">
            <span class="report-menu-label">Profile</span>
          </a>
          <a *ngIf="isAdmin" routerLink="/admin" role="menuitem" class="report-menu-item" (click)="closeUserMenu()">
            <span class="report-menu-label">Admin portal</span>
          </a>
          <button type="button" role="menuitem" class="report-menu-item user-menu-signout" (click)="signOut()">
            <span class="report-menu-label">Sign out</span>
          </button>
        </div>
      </div>
    </div>

    <button
      class="nav-hamburger"
      type="button"
      (click)="toggleMenu()"
      [class.open]="menuOpen"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="menuOpen"
    >
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
<div class="mobile-menu-overlay" [class.open]="menuOpen" (click)="closeMenu()">
  <nav class="mobile-menu" aria-label="Mobile navigation" (click)="$event.stopPropagation()">
    <a routerLink="/" fragment="apps" class="mobile-menu-link" (click)="closeMenu()">Apps</a>
    <a routerLink="/music" class="mobile-menu-link" (click)="closeMenu()">Music</a>
    <a href="https://github.com/Xomware" target="_blank" rel="noopener" class="mobile-menu-link" (click)="closeMenu()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="mobile-menu-icon" aria-hidden="true">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" fill="currentColor"/>
      </svg>
      GitHub
    </a>
    <div class="mobile-menu-section">
      <span class="mobile-menu-section-label">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="mobile-menu-icon" aria-hidden="true">
          <path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" fill="currentColor"/>
        </svg>
        Report Issue
      </span>
      <a
        *ngFor="let target of reportTargets"
        [href]="reportUrl(target.repo)"
        target="_blank"
        rel="noopener"
        class="mobile-menu-sublink"
        (click)="closeMenu()"
      >
        {{ target.label }}
      </a>
    </div>

    <ng-container *ngIf="!user">
      <a routerLink="/auth/sign-in" class="mobile-menu-link" (click)="closeMenu()">Sign in</a>
    </ng-container>
    <ng-container *ngIf="user">
      <a routerLink="/profile" class="mobile-menu-link" (click)="closeMenu()">
        &#64;{{ user.preferredUsername || user.username }}
      </a>
      <button
        type="button"
        class="mobile-menu-link mobile-menu-signout"
        (click)="signOut(); closeMenu()"
      >
        Sign out
      </button>
    </ng-container>
  </nav>
</div>
